<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>漫画台词摘录本</title>
    <!-- 引入思源宋体 (Noto Serif SC) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================
           VAPORWAVE & GLASSMORPHISM UI 重构
        ======================================== */

        :root {
            /* 蒸汽波经典色卡 */
            --vw-pink: #ff71ce;
            --vw-blue: #01cdfe;
            --vw-green: #05ffa1;
            --vw-purple: #b967ff;
            --vw-yellow: #fffb96;

            /* 亮色模式：迈阿密日落 */
            --bg-grad-1: #ffafbd;
            --bg-grad-2: #ffc3a0;
            --sun-top: var(--vw-pink);
            --sun-bottom: #ffb6ff;
            
            --text-primary: #3b1c4a;
            --text-secondary: #653180;
            --text-muted: #8b5b9c;
            
            --accent-color: #ff71ce;
            --accent-hover: #b967ff;
            --danger-color: #ff4b82;
            --star-color: #ff007f;
            
            /* 玻璃拟态属性 */
            --glass-bg: rgba(255, 255, 255, 0.3);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(255, 113, 206, 0.15);
            --glass-blur: blur(12px);
            
            --input-bg: rgba(255, 255, 255, 0.4);
            --grid-color: rgba(255, 113, 206, 0.5);
            
            /* 录像带色差阴影 */
            --vhs-shadow: 2px 2px 0px var(--vw-blue), -2px -1px 0px var(--vw-pink);
            --btn-glow: 0 0 10px rgba(255, 113, 206, 0.5);
        }

        [data-theme="dark"] {
            /* 暗色模式：赛博朋克深紫青 */
            --bg-grad-1: #120424;
            --bg-grad-2: #0a1128;
            --sun-top: var(--vw-pink);
            --sun-bottom: var(--vw-blue);
            
            --text-primary: #05ffa1;
            --text-secondary: #01cdfe;
            --text-muted: #b967ff;
            
            --accent-color: #01cdfe;
            --accent-hover: #05ffa1;
            --danger-color: #ff0055;
            --star-color: var(--vw-yellow);
            
            --glass-bg: rgba(18, 4, 36, 0.5);
            --glass-border: rgba(1, 205, 254, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(1, 205, 254, 0.2);
            
            --input-bg: rgba(0, 0, 0, 0.5);
            --grid-color: rgba(5, 255, 161, 0.3);
            
            --vhs-shadow: 2px 2px 0px var(--vw-pink), -2px -1px 0px var(--vw-blue);
            --btn-glow: 0 0 10px rgba(1, 205, 254, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 蒸汽波背景：渐变 + 移动网格 + 切片太阳 */
        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.8;
            padding-bottom: 80px;
            transition: all 0.4s ease;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            overflow-x: hidden;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: 25vh;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 350px;
            background: linear-gradient(to bottom, var(--sun-top) 0%, var(--sun-bottom) 100%);
            -webkit-mask-image: linear-gradient(to bottom, 
                black 0%, black 45%, transparent 45%, transparent 50%, 
                black 50%, black 65%, transparent 65%, transparent 70%, 
                black 70%, black 80%, transparent 80%, transparent 85%, 
                black 85%, black 92%, transparent 92%, transparent 100%);
            mask-image: linear-gradient(to bottom, 
                black 0%, black 45%, transparent 45%, transparent 50%, 
                black 50%, black 65%, transparent 65%, transparent 70%, 
                black 70%, black 80%, transparent 80%, transparent 85%, 
                black 85%, black 92%, transparent 92%, transparent 100%);
            border-radius: 50%;
            z-index: -2;
            box-shadow: 0 0 60px var(--sun-top);
            opacity: 0.6;
            pointer-events: none;
        }

        body::before {
            content: "";
            position: fixed;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 45vh;
            background: 
                linear-gradient(var(--grid-color) 2px, transparent 2px),
                linear-gradient(90deg, var(--grid-color) 2px, transparent 2px);
            background-size: 40px 40px;
            transform: perspective(600px) rotateX(75deg);
            transform-origin: center top;
            z-index: -1;
            pointer-events: none;
            animation: gridMove 2s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        ::-webkit-scrollbar-thumb { 
            background: var(--accent-color); 
            border-radius: 4px; 
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* 玻璃拟态基础类 */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* === 顶部栏 === */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 16px 20px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .top-bar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .app-title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: var(--vhs-shadow);
            color: var(--text-primary);
            font-style: italic;
            text-transform: uppercase;
        }

        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 6px 16px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }

        .theme-toggle:hover {
            background: var(--accent-color);
            color: #fff;
            box-shadow: var(--btn-glow);
            text-shadow: none;
        }

        [data-theme="dark"] .theme-toggle { background: rgba(0,0,0,0.3); }

        /* === 随机台词模块 === */
        .random-quote-section {
            padding: 20px;
            margin-bottom: 20px;
        }

        .random-quote-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .random-quote-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .random-quote-controls select {
            flex: 1;
            min-width: 150px;
        }

        .random-quote-controls button {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .random-quote-controls button:hover {
            background: var(--accent-color);
            color: #fff;
            box-shadow: var(--btn-glow);
        }

        .random-quote-display {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--glass-shadow);
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .random-quote-display:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(255, 113, 206, 0.3);
        }

        .random-quote-text {
            font-size: 18px;
            line-height: 1.9;
            margin-bottom: 16px;
            font-weight: 700;
            color: var(--text-primary);
            position: relative;
            z-index: 2;
        }

        .random-quote-text::before {
            content: '"';
            font-size: 60px;
            color: var(--accent-color);
            text-shadow: var(--vhs-shadow);
            opacity: 0.3;
            position: absolute;
            left: -15px;
            top: -20px;
            line-height: 1;
            z-index: -1;
        }

        .random-quote-meta {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: right;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .random-quote-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 20px;
            font-style: italic;
        }

        /* === 主容器 === */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 20px;
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* === 页面标题 === */
        .page-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px dashed var(--glass-border);
            text-align: center;
        }

        .page-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-shadow: var(--vhs-shadow);
            text-transform: uppercase;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* === 按钮样式 === */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .btn:hover {
            background: var(--accent-color);
            color: #fff;
            box-shadow: var(--btn-glow);
        }

        .btn-secondary {
            border-color: var(--text-secondary);
            color: var(--text-secondary);
        }
        .btn-secondary:hover {
            background: var(--text-secondary);
            box-shadow: 0 0 10px var(--text-secondary);
            color: #fff;
        }

        .btn-danger {
            border-color: var(--danger-color);
            color: var(--danger-color);
        }
        .btn-danger:hover {
            background: var(--danger-color);
            box-shadow: 0 0 10px var(--danger-color);
            color: #fff;
        }

        .btn-small { padding: 6px 14px; font-size: 12px; border-radius: 6px; }
        .btn-block { display: block; width: 100%; margin-bottom: 16px; }

        /* === 表单样式 === */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.2);
        }
        [data-theme="dark"] .form-label { text-shadow: 1px 1px 0 rgba(0,0,0,0.5); }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            font-weight: bold;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 113, 206, 0.3);
            background: rgba(255,255,255,0.6);
        }
        [data-theme="dark"] .form-input:focus, [data-theme="dark"] .form-textarea:focus, [data-theme="dark"] .form-select:focus {
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 10px rgba(1, 205, 254, 0.3);
        }

        .form-select {
            appearance: none;
            background-image: linear-gradient(45deg, transparent 50%, var(--accent-color) 50%), linear-gradient(135deg, var(--accent-color) 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 2px), calc(100% - 15px) calc(1em + 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }
        
        /* 针对下拉项颜色 */
        option { background: var(--bg-grad-1); color: var(--text-primary); font-weight: bold; }
        [data-theme="dark"] option { background: var(--bg-grad-2); }

        .form-textarea { min-height: 120px; resize: vertical; line-height: 1.8; }
        .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-style: italic; }

        /* === 卡片样式 === */
        .card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px 0 rgba(255, 113, 206, 0.25);
        }
        [data-theme="dark"] .card:hover { box-shadow: 0 12px 40px 0 rgba(1, 205, 254, 0.25); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--text-primary);
            letter-spacing: 1px;
            text-shadow: var(--vhs-shadow);
        }

        .card-actions { display: flex; gap: 8px; }

        .card-content {
            font-size: 15px;
            line-height: 1.9;
            color: var(--text-primary);
            font-weight: 600;
        }

        .card-meta {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px dashed var(--glass-border);
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* === 台词卡片特殊样式 === */
        .quote-card {
            padding-left: 30px;
        }

        .quote-card::before {
            content: '"';
            position: absolute;
            left: 10px;
            top: 15px;
            font-size: 60px;
            color: var(--accent-color);
            opacity: 0.2;
            line-height: 1;
            text-shadow: var(--vhs-shadow);
        }

        .quote-text {
            font-size: 16px;
            line-height: 2;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .quote-impression {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 16px;
            margin-top: 12px;
            border-left: 4px solid var(--accent-color);
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-secondary);
            font-weight: 600;
        }
        [data-theme="dark"] .quote-impression { background: rgba(0, 0, 0, 0.3); }

        .quote-impression-label {
            font-weight: 900;
            color: var(--accent-color);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* === 标签样式 === */
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }

        .tag, .preset-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--accent-color);
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            color: var(--accent-color);
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }
        [data-theme="dark"] .tag, [data-theme="dark"] .preset-tag { background: rgba(0,0,0,0.3); }

        .tag:hover, .preset-tag:hover, .tag.selected, .preset-tag.selected {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .tag-input-container { display: flex; gap: 8px; margin-top: 8px; }
        .tag-input-container input { flex: 1; }

        /* === 作品/角色网格 === */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .grid-item {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: var(--glass-shadow);
        }

        .grid-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px var(--accent-color);
            border-color: var(--accent-color);
        }

        .grid-item-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--glass-border);
            filter: contrast(1.2) saturate(1.2) hue-rotate(-10deg);
        }
        [data-theme="dark"] .grid-item-image { background: rgba(0,0,0,0.3); filter: contrast(1.2) saturate(1.5) hue-rotate(10deg); }

        .grid-item-title {
            font-size: 16px;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 6px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
        }
        [data-theme="dark"] .grid-item-title { text-shadow: 1px 1px 0 rgba(0,0,0,0.8); }

        .grid-item-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
        }

        /* === 筛选与搜索 === */
        .filter-section {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: var(--glass-shadow);
        }

        .filter-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .filter-row:last-child { margin-bottom: 0; }
        .filter-row select, .filter-row input { flex: 1; min-width: 140px; }

        /* === 底部导航 === */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            border-radius: 20px 20px 0 0;
        }
        [data-theme="dark"] .bottom-nav { box-shadow: 0 -4px 20px rgba(1, 205, 254, 0.15); }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            border: none;
            background: none;
            font-family: inherit;
            text-transform: uppercase;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
            transform: translateY(-2px);
        }

        /* === 弹窗 === */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active { display: flex; align-items: flex-start; justify-content: center; animation: fadeIn 0.3s; }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            max-width: 600px;
            width: 100%;
            margin: 40px auto;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px dashed var(--glass-border);
        }

        .modal-title { font-size: 24px; margin-bottom: 0; }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--text-muted);
            border-radius: 50%;
            font-size: 20px;
            color: var(--text-primary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .modal-close:hover {
            background: var(--danger-color);
            color: #fff;
            border-color: var(--danger-color);
            box-shadow: 0 0 10px var(--danger-color);
            transform: rotate(90deg);
        }

        .modal-actions { display: flex; gap: 16px; margin-top: 30px; }
        .modal-actions .btn { flex: 1; }

        /* === 空状态 === */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state-icon { font-size: 60px; margin-bottom: 20px; opacity: 0.5; text-shadow: var(--vhs-shadow); }
        .empty-state-text { font-size: 16px; line-height: 2; font-weight: bold; letter-spacing: 1px; }

        /* === 模式切换 === */
        .mode-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        [data-theme="dark"] .mode-toggle { background: rgba(0,0,0,0.3); }

        .mode-toggle button {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mode-toggle button.active {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-color);
        }

        /* === 确认对话框 === */
        .confirm-text { font-size: 16px; line-height: 1.8; margin-bottom: 20px; color: var(--text-primary); font-weight: bold; }

        /* === 角色星标 === */
        .star-icon { cursor: pointer; font-size: 20px; color: var(--glass-border); transition: all 0.3s; margin-left: 5px; }
        .star-icon:hover { transform: scale(1.2); }
        .star-icon.starred { color: var(--star-color); text-shadow: 0 0 10px var(--star-color); }

        /* === 预设标签选择器 === */
        .preset-tags {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
            padding: 16px; background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border); border-radius: 12px;
        }
        [data-theme="dark"] .preset-tags { background: rgba(0,0,0,0.2); }

        /* === 详情页返回按钮 === */
        .back-button { margin-bottom: 24px; }

        /* === 分组标题 === */
        .group-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--accent-color);
            margin: 32px 0 16px 0;
            padding-bottom: 8px;
            border-bottom: 2px dashed var(--glass-border);
            letter-spacing: 2px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
        }
        .group-title:first-child { margin-top: 0; }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .container { padding: 0 16px 16px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
            .page-title { font-size: 24px; }
            .modal-content { padding: 20px; margin: 20px auto; }
            .app-title { font-size: 18px; }
            body::after { width: 250px; height: 250px; }
        }
    </style>
</head>

        function refreshRandomQuote() {
            const scope = document.getElementById('randomScope').value;
            const scopeValue = document.getElementById('randomScopeValue').value;
            
            let filteredQuotes = [...data.quotes];

            if (scope === 'work' && scopeValue) {
                filteredQuotes = filteredQuotes.filter(q => q.workId == scopeValue);
            } else if (scope === 'character' && scopeValue) {
                filteredQuotes = filteredQuotes.filter(q => q.characterId == scopeValue);
            } else if (scope === 'tag' && scopeValue) {
                filteredQuotes = filteredQuotes.filter(q => q.tags.includes(scopeValue));
            }

            const display = document.getElementById('randomQuoteDisplay');

            if (filteredQuotes.length === 0) {
                display.innerHTML = '<div class="random-quote-empty">没有符合条件的台词</div>';
                return;
            }

            const randomQuote = filteredQuotes[Math.floor(Math.random() * filteredQuotes.length)];
            const work = data.works.find(w => w.id === randomQuote.workId);
            const character = data.characters.find(c => c.id === randomQuote.characterId);

            display.innerHTML = `
                <div class="random-quote-text">${randomQuote.text}</div>
                <div class="random-quote-meta">
                    —— ${character ? character.name : '未知角色'} · 《${work ? work.name : '未知作品'}》
                    ${randomQuote.scene ? ' · ' + randomQuote.scene : ''}
                </div>
            `;
            display.style.cursor = 'pointer';
            display.onclick = () => showQuoteDetail(randomQuote.id);
        }

        document.getElementById('randomScope').addEventListener('change', function() {
            const scopeValueSelect = document.getElementById('randomScopeValue');
            const scope = this.value;

            if (scope === 'all') {
                scopeValueSelect.style.display = 'none';
                scopeValueSelect.innerHTML = '';
            } else if (scope === 'work') {
                scopeValueSelect.style.display = 'block';
                scopeValueSelect.innerHTML = '<option value="">选择作品</option>' +
                    data.works.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
            } else if (scope === 'character') {

            } else if (scope === 'tag') {

                const allTags = [...new Set(data.quotes.flatMap(q => q.tags))];

        function renderQuotesList() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterWork = document.getElementById('filterWork').value;
            const filterCharacter = document.getElementById('filterCharacter').value;
            const filterTag = document.getElementById('filterTag').value;
            const sortOrder = document.getElementById('sortOrder').value;

            let filtered = data.quotes.filter(quote => {
                const work = data.works.find(w => w.id === quote.workId);
                const character = data.characters.find(c => c.id === quote.characterId);
                
                const matchSearch = !searchTerm || 
                    quote.text.toLowerCase().includes(searchTerm) ||
                    (work && work.name.toLowerCase().includes(searchTerm)) ||
                    (character && character.name.toLowerCase().includes(searchTerm)) ||
                    (quote.impression && quote.impression.toLowerCase().includes(searchTerm)) ||
                    quote.tags.some(t => t.toLowerCase().includes(searchTerm));

                const matchWork = !filterWork || quote.workId == filterWork;
                const matchCharacter = !filterCharacter || quote.characterId == filterCharacter;
                const matchTag = !filterTag || quote.tags.includes(filterTag);

                return matchSearch && matchWork && matchCharacter && matchTag;
            });

            filtered.sort((a, b) => {
                if (sortOrder === 'newest') return b.createdAt - a.createdAt;
                if (sortOrder === 'oldest') return a.createdAt - b.createdAt;
                if (sortOrder === 'character') {
                    const charA = data.characters.find(c => c.id === a.characterId);
                    const charB = data.characters.find(c => c.id === b.characterId);
                    return (charA?.name || '').localeCompare(charB?.name || '');
                }
                if (sortOrder === 'work') {
                    const workA = data.works.find(w => w.id === a.workId);
                    const workB = data.works.find(w => w.id === b.workId);
                    return (workA?.name || '').localeCompare(workB?.name || '');
                }
                return 0;
            });

            const container = document.getElementById('quotesList');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">"</div>
                        <div class="empty-state-text">暂无台词记录<br>点击上方按钮添加第一条台词</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(quote => {
                const work = data.works.find(w => w.id === quote.workId);
                const character = data.characters.find(c => c.id === quote.characterId);
                
                return `
                    <div class="card quote-card">
                        <div class="card-header">
                            <div class="card-title">${character ? character.name : '未知角色'}</div>
                            <div class="card-actions">
                                <button class="btn btn-secondary btn-small" onclick="editQuote(${quote.id})">编辑</button>
                                <button class="btn btn-danger btn-small" onclick="deleteQuote(${quote.id})">删除</button>
                            </div>
                        </div>
                        <div class="quote-text">${quote.text}</div>
                        ${quote.impression ? `
                            <div class="quote-impression">
                                <div class="quote-impression-label">此刻印象</div>
                                ${quote.impression}
                            </div>
                        ` : ''}
                        <div class="card-meta">
                            <div>作品：《${work ? work.name : '未知作品'}》</div>
                            ${quote.scene ? `<div>场景：${quote.scene}</div>` : ''}
                            <div>时间：${new Date(quote.createdAt).toLocaleString('zh-CN')}</div>
                        </div>
                        ${quote.tags.length > 0 ? `
                            <div class="tags">
                                ${quote.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderCharactersList() {
            const filterTag = document.getElementById('characterFilterTag').value;
            const sortBy = document.getElementById('characterSort').value;

            let filtered = data.characters.filter(char => {
                return !filterTag || char.tags.includes(filterTag);
            });

            filtered.sort((a, b) => {
                if (sortBy === 'starred') {
                    if (a.starred && !b.starred) return -1;
                    if (!a.starred && b.starred) return 1;
                    return a.name.localeCompare(b.name);
                }
                if (sortBy === 'name') return a.name.localeCompare(b.name);
                if (sortBy === 'recent') return b.createdAt - a.createdAt;
                return 0;
            });

            const container = document.getElementById('charactersList');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👤</div>

            container.innerHTML = filtered.map(char => {

        function selectPresetTag(tag, context) {
            if (context === 'quote') {
                if (!currentQuoteTags.includes(tag)) {
                    currentQuoteTags.push(tag);
                    renderQuoteTags();

            } else if (context === 'character') {
                if (!currentCharacterTags.includes(tag)) {
                    currentCharacterTags.push(tag);
                    renderCharacterTags();

            } else if (context === 'editQuote') {
                if (!currentEditQuoteTags.includes(tag)) {
                    currentEditQuoteTags.push(tag);
                    renderEditQuoteTags();
                }
            } else if (context === 'editCharacter') {
                if (!currentEditCharacterTags.includes(tag)) {
                    currentEditCharacterTags.push(tag);
                    renderEditCharacterTags();
                }
            }
        }

        });

        function editWork(workId) {
            const work = data.works.find(w => w.id === workId);
            if (!work) return;

            document.getElementById('editWorkId').value = work.id;
            document.getElementById('editWorkName').value = work.name;
            document.getElementById('editWorkCover').value = work.cover || '';
            document.getElementById('editWorkDescription').value = work.description || '';

            document.getElementById('editWorkModal').classList.add('active');
        }

        document.getElementById('editWorkForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const workId = parseInt(document.getElementById('editWorkId').value);
            const work = data.works.find(w => w.id === workId);
            
            if (work) {
                work.name = document.getElementById('editWorkName').value.trim();
                work.cover = document.getElementById('editWorkCover').value.trim();
                work.description = document.getElementById('editWorkDescription').value.trim();
                
                saveData();
                closeModal('editWorkModal');
                renderWorksList();
                updateFilterSelects();
                
                if (document.getElementById('workDetailPage').classList.contains('active')) {
                    showWorkDetail(workId);
                }
            }
        });

        function editCharacter(charId) {
            const character = data.characters.find(c => c.id === charId);
            if (!character) return;

            document.getElementById('editCharacterId').value = character.id;
            document.getElementById('editCharacterName').value = character.name;
            document.getElementById('editCharacterAvatar').value = character.avatar || '';
            document.getElementById('editCharacterReview').value = character.review || '';
            
            currentEditCharacterTags = [...character.tags];
            
            renderPresetTags('editCharacterPresetTags', 'editCharacter');
            renderEditCharacterTags();

            document.getElementById('editCharacterModal').classList.add('active');
        }

        function addEditCharacterTag() {
            const input = document.getElementById('editCharacterTagInput');
            const tag = input.value.trim();
            if (tag && !currentEditCharacterTags.includes(tag)) {
                const formattedTag = tag.startsWith('#') ? tag : '#' + tag;
                currentEditCharacterTags.push(formattedTag);
                renderEditCharacterTags();
                input.value = '';
            }
        }

        function renderEditCharacterTags() {
            const container = document.getElementById('editCharacterTagsDisplay');
            container.innerHTML = currentEditCharacterTags.map(tag => 
                `<span class="tag" onclick="removeEditCharacterTag('${tag}')">${tag} ×</span>`
            ).join('');
        }

        function removeEditCharacterTag(tag) {
            currentEditCharacterTags = currentEditCharacterTags.filter(t => t !== tag);
            renderEditCharacterTags();
        }

        document.getElementById('editCharacterForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const charId = parseInt(document.getElementById('editCharacterId').value);
            const character = data.characters.find(c => c.id === charId);
            
            if (character) {
                character.name = document.getElementById('editCharacterName').value.trim();
                character.avatar = document.getElementById('editCharacterAvatar').value.trim();
                character.review = document.getElementById('editCharacterReview').value.trim();
                character.tags = [...currentEditCharacterTags];
                
                saveData();
                closeModal('editCharacterModal');
                renderCharactersList();
                updateFilterSelects();
                
                if (document.getElementById('characterDetailPage').classList.contains('active')) {
                    showCharacterDetail(charId);
                }
            }
        });

        function deleteQuote(quoteId) {
            showConfirm('确定要删除这条台词吗？此操作无法撤销。', () => {
                data.quotes = data.quotes.filter(q => q.id !== quoteId);
                saveData();
                renderQuotesList();
                refreshRandomQuote();
            });
        }

        function deleteWork(workId) {
            const quoteCount = data.quotes.filter(q => q.workId === workId).length;
            showConfirm(
                `确定要删除这部作品吗？${quoteCount > 0 ? `关联的 ${quoteCount} 条台词也将被删除。` : ''}此操作无法撤销。`,
                () => {
                    data.works = data.works.filter(w => w.id !== workId);
                    data.quotes = data.quotes.filter(q => q.workId !== workId);
                    saveData();
                    showPage('worksPage');
                    renderWorksList();
                    updateFilterSelects();
                    refreshRandomQuote();
                }
            );
        }

        function deleteCharacter(charId) {
            const quoteCount = data.quotes.filter(q => q.characterId === charId).length;
            showConfirm(
                `确定要删除这个角色吗？${quoteCount > 0 ? `关联的 ${quoteCount} 条台词也将被删除。` : ''}此操作无法撤销。`,
                () => {
                    data.characters = data.characters.filter(c => c.id !== charId);
                    data.quotes = data.quotes.filter(q => q.characterId !== charId);
                    saveData();
                    showPage('charactersPage');
                    renderCharactersList();
                    updateFilterSelects();
                    refreshRandomQuote();
                }
            );
        }

        function exportData() {
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `comic-quotes-backup-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    showConfirm(
                        '选择导入方式：\n\n点击"确认"将覆盖现有数据\n点击"取消"后可选择合并数据',
                        () => {
                            data = importedData;
                            saveData();
                            renderAllLists();
                            alert('数据导入成功（覆盖模式）');
                        },
                        () => {
                            showConfirm(
                                '是否合并导入的数据？\n\n合并模式会保留现有数据并添加新数据',
                                () => {
                                    mergeData(importedData);
                                    saveData();
                                    renderAllLists();
                                    alert('数据合并成功');
                                }
                            );
                        }
                    );
                } catch (error) {
                    alert('导入失败：文件格式错误');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function mergeData(importedData) {
            if (importedData.works) {
                importedData.works.forEach(work => {
                    work.id = Date.now() + Math.random();
                    data.works.push(work);
                });
            }
            if (importedData.characters) {
                importedData.characters.forEach(char => {
                    char.id = Date.now() + Math.random();
                    data.characters.push(char);
                });
            }
            if (importedData.quotes) {
                importedData.quotes.forEach(quote => {
                    quote.id = Date.now() + Math.random();
                    data.quotes.push(quote);
                });
            }
        }

        function clearExampleData() {
            showConfirm('确定要清除示例数据吗？', () => {
                const exampleWorkIds = data.works.filter(w => 
                    w.name.includes('蝙蝠侠') || w.name.includes('守望者')
                ).map(w => w.id);
                
                const exampleCharIds = data.characters.filter(c => 
                    c.name.includes('布鲁斯') || c.name.includes('罗夏')
                ).map(c => c.id);

                data.works = data.works.filter(w => !exampleWorkIds.includes(w.id));
                data.characters = data.characters.filter(c => !exampleCharIds.includes(c.id));
                data.quotes = data.quotes.filter(q => 
                    !exampleWorkIds.includes(q.workId) && !exampleCharIds.includes(q.characterId)
                );

                saveData();
                renderAllLists();
                alert('示例数据已清除');
            });
        }

        function clearAllData() {
            showConfirm('警告：此操作将删除所有数据，包括作品、角色和台词。确定要继续吗？', () => {
                data = {
                    works: [],
                    characters: [],
                    quotes: [],
                    settings: { theme: data.settings.theme }
                };
                saveData();
                renderAllLists();
                alert('所有数据已清除');
            });
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function showConfirm(message, onConfirm, onCancel) {
            document.getElementById('confirmText').textContent = message;
            document.getElementById('confirmButton').onclick = () => {
                closeModal('confirmModal');
                if (onConfirm) onConfirm();
            };
            
            if (onCancel) {
                const cancelBtn = document.querySelector('#confirmModal .btn-secondary');
                cancelBtn.onclick = () => {
                    closeModal('confirmModal');
                    onCancel();
                };
            }
            
            document.getElementById('confirmModal').classList.add('active');
        }

        function populateWorkSelect(selectId) {
            const select = document.getElementById(selectId);
            const currentValue = select.value;
            select.innerHTML = '<option value="">选择作品</option>' +
                data.works.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
            if (currentValue) select.value = currentValue;
        }

        function populateCharacterSelect(selectId) {
            const select = document.getElementById(selectId);
            const currentValue = select.value;
            select.innerHTML = '<option value="">选择角色</option>' +
                data.characters.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            if (currentValue) select.value = currentValue;
        }

        function updateFilterSelects() {
            const filterWork = document.getElementById('filterWork');
            filterWork.innerHTML = '<option value="">全部作品</option>' +
                data.works.map(w => `<option value="${w.id}">${w.name}</option>`).join('');

            const filterCharacter = document.getElementById('filterCharacter');
            filterCharacter.innerHTML = '<option value="">全部角色</option>' +
                data.characters.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

            const allQuoteTags = [...new Set(data.quotes.flatMap(q => q.tags))];
            const filterTag = document.getElementById('filterTag');
            filterTag.innerHTML = '<option value="">全部标签</option>' +
                allQuoteTags.map(t => `<option value="${t}">${t}</option>`).join('');

            const allCharTags = [...new Set(data.characters.flatMap(c => c.tags))];
            const characterFilterTag = document.getElementById('characterFilterTag');
            characterFilterTag.innerHTML = '<option value="">全部标签</option>' +
                allCharTags.map(t => `<option value="${t}">${t}</option>`).join('');
        }

        function renderAllLists() {
            renderQuotesList();
            renderWorksList();
            renderCharactersList();
            updateFilterSelects();
            refreshRandomQuote();
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', renderQuotesList);
            document.getElementById('filterWork').addEventListener('change', renderQuotesList);
            document.getElementById('filterCharacter').addEventListener('change', renderQuotesList);
            document.getElementById('filterTag').addEventListener('change', renderQuotesList);
            document.getElementById('sortOrder').addEventListener('change', renderQuotesList);
            document.getElementById('characterFilterTag').addEventListener('change', renderCharactersList);
            document.getElementById('characterSort').addEventListener('change', renderCharactersList);

            const draftFields = ['quoteText', 'quoteScene', 'quoteImpression'];
            draftFields.forEach(fieldId => {
                const field = document.getElementById(fieldId);
                if (field) {
                    field.addEventListener('input', saveDraft);
                }
            });
        }

        function saveDraft() {
            const draft = {
                text: document.getElementById('quoteText').value,
                scene: document.getElementById('quoteScene').value,
                impression: document.getElementById('quoteImpression').value,
                tags: currentQuoteTags
            };
            localStorage.setItem('quoteDraft', JSON.stringify(draft));
        }

        function loadDraft() {
            const draft = localStorage.getItem('quoteDraft');
            if (draft) {
                try {
                    const parsed = JSON.parse(draft);
                } catch (e) {}
            }
        }

        function clearDraft() {
            localStorage.removeItem('quoteDraft');
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
