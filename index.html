<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>补刊档案馆 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ================= 核心变量 (Vaporwave x Glassmorphism) ================= */
        :root {
            color-scheme: dark; /* 强制浏览器原生组件采用暗黑模式 */
            
            --vapor-pink: #ff71ce;
            --vapor-cyan: #01cdfe;
            --vapor-purple: #b967ff;
            --vapor-yellow: #fffb96;
            --vapor-green: #05ffa1;
            
            --sys-bg: transparent;
            --app-bg: rgba(20, 10, 35, 0.4);
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.15);
            
            --text-main: #f0ebff;
            --text-sec: var(--vapor-cyan);
            --text-tert: var(--vapor-purple);
            
            --primary: var(--vapor-pink);
            --primary-light: rgba(255, 113, 206, 0.2);
            --accent: var(--vapor-cyan);
            --success: var(--vapor-green);
            --success-bg: rgba(5, 255, 161, 0.15);
            --warning: var(--vapor-yellow);
            --warning-bg: rgba(255, 251, 150, 0.15);
            --danger: #ff0055;
            --danger-bg: rgba(255, 0, 85, 0.15);

            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 32px;
            
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 25px rgba(0,0,0,0.4);
            --shadow-lg: 0 15px 35px rgba(1, 205, 254, 0.15);
            --glass-blur: blur(16px);
            
            --nav-h: 68px;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* ================= 基础重置 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #0b0118; color: var(--text-main); font-family: var(--font-sans); 
            line-height: 1.5; display: flex; justify-content: center; min-height: 100vh; 
            padding: 20px 10px; margin: 0; overflow-x: hidden;
        }
        button, input, select, textarea { font: inherit; outline: none; border: none; background: none; color: inherit; }
        button { cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        button:active { transform: scale(0.96); }
        a { color: var(--primary); text-decoration: none; text-shadow: 0 0 5px var(--vapor-pink); }
        ul, li { list-style: none; }

        /* ================= 蒸汽波背景 (Vaporwave Background) ================= */
        .vapor-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; background: linear-gradient(180deg, #180436 0%, #300652 40%, #000000 100%);
            overflow: hidden; pointer-events: none;
        }
        .vapor-sun {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px;
            background: linear-gradient(180deg, var(--vapor-pink) 0%, var(--vapor-pink) 40%, var(--vapor-yellow) 100%);
            border-radius: 50%; box-shadow: 0 0 60px var(--vapor-pink);
            mask-image: linear-gradient(180deg, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,1) 60%, rgba(0,0,0,0.1) 100%);
        }
        .vapor-sun::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(180deg, transparent, transparent 15px, #000 15px, #000 20px);
        }
        .vapor-grid {
            position: absolute; bottom: 0; left: 0; width: 100vw; height: 50vh;
            background: 
                linear-gradient(rgba(255, 113, 206, 0.4) 2px, transparent 2px),
                linear-gradient(90deg, rgba(1, 205, 254, 0.4) 2px, transparent 2px);
            background-size: 60px 40px;
            transform: perspective(600px) rotateX(70deg); transform-origin: top;
            box-shadow: inset 0 20px 60px #0b0118;
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
            background-size: 100% 4px; z-index: 9999; pointer-events: none; opacity: 0.6;
        }

        /* ================= 布局框架 ================= */
        .app-frame {
            width: 100%; max-width: 440px; background: var(--app-bg); border-radius: var(--radius-xl);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.2); 
            overflow: hidden; display: flex; flex-direction: column; position: relative;
            height: calc(100vh - 40px); min-height: 700px; z-index: 10;
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
        }
        
        .header {
            padding: 16px 20px 12px; 
            background: rgba(15, 5, 30, 0.5); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            position: sticky; top: 0; z-index: 40; border-bottom: 1px solid rgba(1, 205, 254, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .page-title { 
            font-size: 24px; font-weight: 700; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; 
            font-family: var(--font-serif); text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(1, 205, 254, 0.6), -1px -1px 0px rgba(255, 113, 206, 0.6);
            color: #fff;
        }
        .page-title svg { stroke: var(--vapor-cyan); filter: drop-shadow(0 0 5px var(--vapor-cyan)); }
        
        .main-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; scroll-behavior: smooth; }
        .main-scroll::-webkit-scrollbar { width: 0; display: none; }
        
        .page { display: none; padding: 0 0 100px 0; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= 导航栏 ================= */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; right: 0; height: calc(var(--nav-h) + var(--safe-bottom));
            background: rgba(15, 5, 30, 0.6); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid rgba(1, 205, 254, 0.3); display: flex; justify-content: space-around; padding: 0 10px var(--safe-bottom);
            z-index: 50; box-shadow: 0 -5px 25px rgba(0,0,0,0.4);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: rgba(255,255,255,0.4); }
        .nav-item.active { color: var(--vapor-pink); text-shadow: 0 0 8px var(--vapor-pink); }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; transition: 0.3s; }
        .nav-item.active svg { transform: translateY(-2px); stroke-width: 2.5; filter: drop-shadow(0 0 6px var(--vapor-pink)); }
        .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; }

        /* ================= 悬浮添加按钮 ================= */
        .fab {
            position: absolute; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); right: 20px;
            width: 52px; height: 52px; border-radius: 26px; 
            background: linear-gradient(135deg, var(--vapor-pink), var(--vapor-purple)); color: #fff;
            box-shadow: 0 0 20px rgba(255, 113, 206, 0.6); display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 300; z-index: 45; transition: 0.3s;
        }
        .fab:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 0 30px rgba(255, 113, 206, 0.9); }

        /* ================= UI 组件 ================= */
        /* 搜索框 */
        .search-box { 
            width: 100%; background: var(--surface); border: 1px solid rgba(255, 113, 206, 0.3); 
            padding: 10px 14px; border-radius: var(--radius-lg); font-size: 14px; transition: 0.2s; 
            display: flex; align-items: center; gap: 8px; color: var(--text-main);
        }
        .search-box:focus-within { 
            border-color: var(--vapor-pink); background: rgba(255,255,255,0.1); 
            box-shadow: 0 0 10px rgba(255, 113, 206, 0.5); 
        }
        .search-box input { flex: 1; width: 100%; color: #fff; }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }
        
        /* 按钮体系 */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; transition: 0.2s; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, var(--vapor-pink), var(--vapor-purple)); color: #fff; box-shadow: 0 0 10px rgba(255, 113, 206, 0.4); }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(255, 113, 206, 0.8); }
        .btn-outline { border: 1px solid var(--border); background: rgba(255, 255, 255, 0.05); color: var(--text-sec); }
        .btn-outline:hover { background: rgba(1, 205, 254, 0.2); box-shadow: 0 0 10px rgba(1, 205, 254, 0.4); color: #fff; }
        .btn-danger { background: rgba(255, 0, 85, 0.1); color: var(--danger); border: 1px solid rgba(255, 0, 85, 0.3); }
        .btn-danger:hover { background: rgba(255, 0, 85, 0.25); box-shadow: 0 0 15px rgba(255, 0, 85, 0.5); color: #fff;}
        .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
        .btn-icon { padding: 6px; border-radius: 50%; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--vapor-cyan); }
        .btn-icon:hover { background: rgba(1, 205, 254, 0.2); box-shadow: 0 0 10px rgba(1, 205, 254, 0.5); color: #fff; }
        .btn-icon.active { background: rgba(255, 113, 206, 0.2); color: var(--vapor-pink); border-color: var(--vapor-pink); box-shadow: 0 0 10px rgba(255, 113, 206, 0.5); }

        /* 卡片设计 */
        .card { 
            background: rgba(25, 10, 45, 0.45); border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: var(--radius-md); padding: 16px; margin: 0 16px 12px; transition: 0.3s; position: relative; 
            backdrop-filter: blur(12px) saturate(150%); -webkit-backdrop-filter: blur(12px) saturate(150%);
        }
        .card:hover { box-shadow: 0 0 20px rgba(1, 205, 254, 0.2); border-color: rgba(1, 205, 254, 0.5); }
        .card.deleted { border-style: dashed; opacity: 0.6; filter: grayscale(1); }
        
        /* 自定义复选框 */
        input[type="checkbox"] {
            appearance: none; -webkit-appearance: none; width: 16px; height: 16px;
            background: rgba(0,0,0,0.4); border: 1px solid var(--vapor-cyan); border-radius: 3px; cursor: pointer; position: relative;
        }
        input[type="checkbox"]:checked { background: var(--vapor-pink); border-color: var(--vapor-pink); box-shadow: 0 0 8px var(--vapor-pink); }
        input[type="checkbox"]:checked::after {
            content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px;
            border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg);
        }

        /* 徽章与标签 */
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: #fff; text-shadow: 0 0 4px rgba(0,0,0,0.5); }
        .badge-dcu { background: rgba(1, 205, 254, 0.2); color: #01cdfe; border-color: #01cdfe; }
        .badge-rebirth { background: rgba(255, 251, 150, 0.2); color: #fffb96; border-color: #fffb96; }
        .badge-dark { background: rgba(185, 103, 255, 0.2); color: #b967ff; border-color: #b967ff; }
        .badge-done { background: rgba(5, 255, 161, 0.2); color: #05ffa1; border-color: #05ffa1; }
        .badge-reading { background: rgba(255, 113, 206, 0.2); color: #ff71ce; border-color: #ff71ce; }
        .badge-unread { background: var(--surface); color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.2); }
        
        .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag { font-size: 11px; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--vapor-cyan); border: 1px solid rgba(1, 205, 254, 0.3); cursor: pointer; transition: 0.2s;}
        .tag:hover, .tag.active { background: rgba(1, 205, 254, 0.25); color: #fff; border-color: var(--vapor-cyan); box-shadow: 0 0 10px rgba(1, 205, 254, 0.5); }
        
        /* 文本排版 */
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: #fff; font-family: var(--font-serif); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; text-shadow: 0 0 5px rgba(255, 113, 206, 0.4);}
        .meta { font-size: 12px; color: var(--text-sec); display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; letter-spacing: 0.5px;}
        .desc { font-size: 13px; color: #e0d8f0; margin-top: 8px; background: rgba(0,0,0,0.25); padding: 10px; border-radius: var(--radius-sm); border-left: 3px solid var(--vapor-pink); font-family: var(--font-serif); box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);}
        
        /* 进度条 */
        .progress-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; color: var(--text-sec); }
        .progress-bar { flex: 1; height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; overflow: hidden; border: 1px solid rgba(1, 205, 254, 0.3); box-shadow: inset 0 0 5px rgba(0,0,0,0.8);}
        .progress-inner { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--vapor-purple), var(--vapor-pink)); transition: width 0.5s; box-shadow: 0 0 8px var(--vapor-pink);}
        .progress-inner.high { background: linear-gradient(90deg, var(--vapor-cyan), var(--vapor-green)); box-shadow: 0 0 8px var(--vapor-green); }
        .progress-inner.low { background: linear-gradient(90deg, #ff0055, #ff71ce); box-shadow: 0 0 8px #ff0055; }

        /* 图片与封面 */
        .cover { width: 64px; height: 96px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 10px; color: rgba(255,255,255,0.3); text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
        
        /* 空状态 */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--vapor-cyan); opacity: 0.8; }
        .empty-state svg { width: 64px; height: 64px; stroke: var(--vapor-pink); margin-bottom: 16px; filter: drop-shadow(0 0 6px var(--vapor-pink)); }

        /* ================= 模态框与表单 ================= */
        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 10, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
        .overlay.active { display: flex; animation: fadeInOverlay 0.2s ease; }
        @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
        
        .modal { background: rgba(20, 10, 35, 0.85); width: 100%; max-width: 440px; max-height: 90vh; border-radius: 24px 24px 0 0; padding: 24px 20px env(safe-area-inset-bottom); display: flex; flex-direction: column; animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 -10px 40px rgba(1, 205, 254, 0.2); border: 1px solid var(--border); border-bottom: none; backdrop-filter: var(--glass-blur); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-title { font-size: 18px; font-weight: 600; color: #fff; text-shadow: 0 0 5px var(--vapor-cyan); text-transform: uppercase; }
        .modal-close { background: rgba(255,255,255,0.1); width: 32px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: #fff; }
        .modal-body { overflow-y: auto; flex: 1; padding-bottom: 20px; }
        .modal-body::-webkit-scrollbar { width: 0; display: none; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--vapor-cyan); text-transform: uppercase;}
        .form-control { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: rgba(0,0,0,0.3); transition: 0.2s; color: #fff; }
        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        .form-control:focus { background: rgba(255,255,255,0.05); border-color: var(--vapor-pink); box-shadow: 0 0 10px rgba(255, 113, 206, 0.4); }
        .form-control option { background: #1a0b2e; color: #f0f0f0; }
        textarea.form-control { min-height: 80px; resize: vertical; font-family: var(--font-serif); }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .checkbox-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; color: var(--text-sec); cursor: pointer; transition: 0.2s; user-select: none; background: rgba(255,255,255,0.05);}
        .checkbox-btn.active { background: rgba(1, 205, 254, 0.2); border-color: var(--vapor-cyan); color: #fff; box-shadow: 0 0 8px rgba(1, 205, 254, 0.4); }

        /* ================= 批量操作栏 ================= */
        .batch-bar { position: absolute; bottom: calc(var(--nav-h) + var(--safe-bottom) + 10px); left: 16px; right: 16px; background: rgba(20, 10, 30, 0.85); backdrop-filter: blur(12px); color: #fff; padding: 12px 16px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: space-between; z-index: 44; box-shadow: 0 0 20px rgba(255, 113, 206, 0.4); border: 1px solid var(--vapor-pink); transform: translateY(150%); transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .batch-bar.show { transform: translateY(0); }
        .batch-actions { display: flex; gap: 8px; }
        .batch-btn { padding: 6px 10px; font-size: 11px; border-radius: 6px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        /* ================= 时间线视图 ================= */
        .timeline-wrap { padding: 0 20px 20px 32px; border-left: 2px solid var(--vapor-cyan); margin-left: 36px; box-shadow: -1px 0 10px rgba(1, 205, 254, 0.3); }
        .tl-item { position: relative; padding: 16px; border-radius: var(--radius-md); margin-bottom: 20px; }
        .tl-item::before { content: ''; position: absolute; left: -26px; top: 20px; width: 12px; height: 12px; border-radius: 50%; background: var(--vapor-cyan); border: 3px solid #0b0118; box-shadow: 0 0 10px var(--vapor-cyan); }
        .tl-time { font-size: 12px; color: var(--vapor-cyan); font-weight: 600; margin-bottom: 4px; text-shadow: 0 0 4px rgba(1, 205, 254, 0.5); }

        /* ================= 统计视图 ================= */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
        .stat-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(1, 205, 254, 0.3); padding: 16px; border-radius: var(--radius-md); text-align: center; backdrop-filter: blur(8px); }
        .stat-val { font-size: 28px; font-weight: 700; color: var(--vapor-pink); line-height: 1; margin-bottom: 4px; text-shadow: 0 0 10px rgba(255, 113, 206, 0.6); }
        .stat-label { font-size: 12px; color: var(--vapor-cyan); text-transform: uppercase; }
        
        .calendar-wrap { margin: 16px; padding: 16px; background: rgba(25, 15, 35, 0.5); border: 1px solid var(--border); border-radius: var(--radius-md); overflow-x: auto; backdrop-filter: blur(8px); }
        .cal-grid { display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; gap: 3px; }
        .cal-cell { width: 12px; height: 12px; border-radius: 3px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
        .cal-cell[data-lv="1"] { background: rgba(1, 205, 254, 0.2); border-color: rgba(1, 205, 254, 0.4); }
        .cal-cell[data-lv="2"] { background: rgba(1, 205, 254, 0.5); border-color: rgba(1, 205, 254, 0.7); box-shadow: 0 0 5px rgba(1, 205, 254, 0.5); }
        .cal-cell[data-lv="3"] { background: rgba(255, 113, 206, 0.7); border-color: rgba(255, 113, 206, 0.9); box-shadow: 0 0 8px rgba(255, 113, 206, 0.7); }
        .cal-cell[data-lv="4"] { background: rgba(255, 113, 206, 1); border-color: #fff; box-shadow: 0 0 12px rgba(255, 113, 206, 1); }
        .cal-cell:hover { transform: scale(1.3); box-shadow: 0 2px 10px rgba(255,255,255,0.5); }

        /* ================= 交互反馈 (Toast/Dialog) ================= */
        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(20, 10, 30, 0.9); border: 1px solid var(--vapor-cyan); color: var(--vapor-cyan); box-shadow: 0 0 15px rgba(1, 205, 254, 0.4); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(8px); text-transform: uppercase; letter-spacing: 1px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .dialog-overlay.active { display: flex; animation: fadeInOverlay 0.2s; }
        .dialog { background: rgba(20, 10, 30, 0.85); width: 300px; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 0 30px rgba(1, 205, 254, 0.2); border: 1px solid var(--border); animation: zoomIn 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); color: #fff; backdrop-filter: blur(12px); }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .dialog h3 { font-size: 16px; margin-bottom: 8px; text-shadow: 0 0 5px var(--vapor-pink); text-transform: uppercase;}
        .dialog p { font-size: 13px; color: var(--text-sec); margin-bottom: 20px; }
        .dialog-btns { display: flex; gap: 10px; }
        .dialog-btns button { flex: 1; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 14px; text-transform: uppercase;}
        .dialog-btn-cancel { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);}
        .dialog-btn-confirm { background: linear-gradient(135deg, var(--vapor-pink), var(--vapor-purple)); color: #fff; box-shadow: 0 0 10px rgba(255, 113, 206, 0.5);}

        /* 工具类 */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-start { display: flex; align-items: center; gap: 8px; }
        .mt-2 { margin-top: 8px; } .mt-4 { margin-top: 16px; }
        .text-danger { color: var(--danger); text-shadow: 0 0 5px rgba(255, 0, 85, 0.5); }
        .hidden { display: none !important; }
        
        /* 编辑器简易版 */
        .editor-bar { display: flex; gap: 4px; background: rgba(255,255,255,0.05); padding: 4px; border: 1px solid var(--border); border-bottom: none; border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
        .editor-bar button { padding: 4px 8px; font-size: 12px; border-radius: 4px; color: var(--text-sec); }
        .editor-bar button:hover { background: rgba(1, 205, 254, 0.2); box-shadow: 0 0 5px rgba(1, 205, 254, 0.5); color: #fff;}
        .editor-content { min-height: 100px; padding: 12px; border: 1px solid var(--border); border-radius: 0 0 var(--radius-sm) var(--radius-sm); outline: none; font-family: var(--font-serif); font-size: 14px; background: rgba(0,0,0,0.3); color: #fff; }
        .editor-content:focus { border-color: var(--vapor-pink); box-shadow: 0 0 8px rgba(255, 113, 206, 0.4); }
    </style>
</head>
<body>

<!-- Vaporwave 氛围层 -->
<div class="vapor-bg">
    <div class="vapor-sun"></div>
    <div class="vapor-grid"></div>
</div>
<div class="scanlines"></div>

<div class="app-frame" id="app">
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div class="page-title" id="pageTitle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                补刊记录
            </div>
            <div class="flex-start">
                <button class="btn-icon" id="btnTrash" title="回收站"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
            </div>
        </div>
        <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="搜索内容、作者、标签...">
        </div>
        <div id="filterTip" class="mt-2" style="font-size:11px;color:var(--vapor-cyan);display:none;align-items:center;gap:4px;text-shadow:0 0 4px var(--vapor-cyan);">
            <span>[FILTER]: <b id="filterTagName"></b></span>
            <button id="btnClearFilter" style="text-decoration:underline;">[CLEAR]</button>
        </div>
    </header>

    <!-- Pages -->
    <div class="main-scroll" id="mainScroll">
        <!-- P1: 补刊记录 -->
        <div class="page active" data-page="book" id="pageBook">
            <div class="flex-between" style="padding: 10px 16px;">
                <div class="tag-row" id="bookTagBar" style="margin-top:0;"></div>
                <select id="bookSort" style="font-size:12px; color:var(--text-sec); background:transparent;">
                    <option value="default">默认排序</option>
                    <option value="date-desc">日期优先</option>
                    <option value="progress">进度优先</option>
                </select>
            </div>
            <div id="bookList"></div>
        </div>

        <!-- P2: 官方设定 -->
        <div class="page" data-page="setting" id="pageSetting">
            <div style="padding: 10px 16px;"><div class="tag-row" id="settingTagBar" style="margin-top:0;"></div></div>
            <div id="settingList"></div>
        </div>

        <!-- P3: 二创仓库 -->
        <div class="page" data-page="create" id="pageCreate">
            <div style="padding: 10px 16px;">
                <div class="checkbox-group mb-2" id="createTabGroup">
                    <div class="checkbox-btn active" data-val="">全部</div>
                    <div class="checkbox-btn" data-val="同人图">同人图</div>
                    <div class="checkbox-btn" data-val="同人文">同人文</div>
                    <div class="checkbox-btn" data-val="分析">分析</div>
                    <div class="checkbox-btn" data-val="灵感">灵感</div>
                </div>
                <div class="tag-row" id="createTagBar"></div>
            </div>
            <div id="createList"></div>
        </div>

        <!-- P4: 时间线 -->
        <div class="page" data-page="timeline" id="pageTimeline">
            <div style="padding: 10px 16px;">
                <div class="checkbox-group mb-2">
                    <button class="checkbox-btn active" id="btnViewList">列表视图</button>
                    <button class="checkbox-btn" id="btnViewTime">时间轴视图</button>
                </div>
                <div class="tag-row" id="timelineTagBar"></div>
            </div>
            <div id="timelineList"></div>
        </div>

        <!-- P5: 统计中心 -->
        <div class="page" data-page="stats" id="pageStats">
            <div style="padding: 16px;">
                <h3 class="card-title">概览数据</h3>
                <div class="stat-grid mt-2">
                    <div class="stat-box"><div class="stat-val" id="stDone">0</div><div class="stat-label">已读完</div></div>
                    <div class="stat-box"><div class="stat-val" id="stReading" style="color:var(--accent)">0</div><div class="stat-label">在读中</div></div>
                    <div class="stat-box"><div class="stat-val" id="stRemain" style="color:var(--warning)">0</div><div class="stat-label">未读待补</div></div>
                    <div class="stat-box"><div class="stat-val" id="stTotal" style="color:#fff">0</div><div class="stat-label">总记录数</div></div>
                </div>

                <h3 class="card-title mt-4">阅读热力图 (近半年)</h3>
                <div class="calendar-wrap" id="calContainer"></div>

                <h3 class="card-title mt-4">宇宙分支完成度</h3>
                <div id="stBranch" class="mt-2"></div>

                <h3 class="card-title mt-4">系统与数据管理</h3>
                <div class="card mt-2" style="margin:0; padding:12px;">
                    <div style="display:flex; flex-wrap:wrap; gap:8px;">
                        <button class="btn btn-outline btn-sm" id="btnExport">[SYS] 导出JSON备份</button>
                        <button class="btn btn-outline btn-sm" id="btnImport">[SYS] 导入数据</button>
                        <button class="btn btn-outline btn-sm" id="btnClearImg">[CMD] 清理Base64图片</button>
                        <button class="btn btn-danger btn-sm" id="btnEmptyTrash">[DEL] 清空回收站</button>
                    </div>
                    <div class="meta mt-2" id="storageInfo">存储用量：计算中...</div>
                    <input type="file" id="fileImport" accept=".json" style="display:none;">
                </div>
            </div>
        </div>
    </div>

    <!-- 底部批量操作悬浮栏 -->
    <div class="batch-bar" id="batchBar">
        <span style="font-size:13px; font-weight:600; text-transform:uppercase;">已选 <span id="batchCount" style="color:var(--vapor-pink);">0</span> 项</span>
        <div class="batch-actions">
            <button class="batch-btn" id="bMarkDone">标为已读</button>
            <button class="batch-btn" id="bDelete" style="color:#fca5a5; border-color:#fca5a5;">删除</button>
            <button class="batch-btn" id="bCancel">取消</button>
        </div>
    </div>

    <!-- FAB -->
    <button class="fab" id="fabAdd">+</button>

    <!-- 底部导航 -->
    <nav class="bottom-nav" id="nav">
        <div class="nav-item active" data-target="book">
            <svg viewBox="0 0 24 24"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            <span class="nav-label">补刊</span>
        </div>
        <div class="nav-item" data-target="setting">
            <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            <span class="nav-label">设定</span>
        </div>
        <div class="nav-item" data-target="create">
            <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
            <span class="nav-label">二创</span>
        </div>
        <div class="nav-item" data-target="timeline">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span class="nav-label">时间线</span>
        </div>
        <div class="nav-item" data-target="stats">
            <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span class="nav-label">统计</span>
        </div>
    </nav>
</div>

<!-- ================= 统一表单模态框 ================= -->
<div class="overlay" id="modalForm">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="mfTitle">新增记录</div>
            <button class="modal-close" id="mfClose">✕</button>
        </div>
        <div class="modal-body" id="mfBody">
            <!-- 动态注入表单内容 -->
        </div>
        <div style="padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1);">
            <button class="btn btn-primary" style="width: 100%; padding: 12px; font-size:16px; letter-spacing: 2px;" id="btnSaveForm">保存记录</button>
        </div>
    </div>
</div>

<!-- ================= 关联详情模态框 ================= -->
<div class="overlay" id="modalDetail">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">详情</div>
            <button class="modal-close" onclick="document.getElementById('modalDetail').classList.remove('active')">✕</button>
        </div>
        <div class="modal-body" id="detailContent"></div>
    </div>
</div>

<!-- Toast & Dialog 容器 -->
<div class="toast" id="toast"></div>
<div class="dialog-overlay" id="dialog">
    <div class="dialog">
        <h3 id="dgTitle">提示</h3>
        <p id="dgMsg">确认执行此操作吗？</p>
        <div class="dialog-btns">
            <button class="dialog-btn-cancel" id="dgCancel">取消</button>
            <button class="dialog-btn-confirm" id="dgConfirm">确认</button>
        </div>
    </div>
</div>

<script>
/**
 * ==========================================
 * 补刊档案馆 Pro - 核心逻辑重构版 (UI Upgraded)
 * ==========================================
 */

// ================= 工具库 =================
const Utils = {
    id: () => Date.now() + Math.floor(Math.random()*1000),
    escape: str => String(str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),
    stripHtml: html => String(html||'').replace(/<[^>]*>?/gm, '').trim(),
    isValidImg: url => /^(https?:\/\/|data:image\/)/i.test((url||'').trim()),
    formatDate: dStr => {
        if(!dStr) return '';
        try {
            const d = new Date(dStr.includes('T') ? dStr : dStr + 'T00:00:00');
            return isNaN(d.getTime()) ? '' : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        } catch(e) { return ''; }
    },
    debounce: (fn, delay) => { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); }; }
};

// ================= UI 反馈系统 =================
const UI = {
    toast: (msg, duration=2000) => {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        clearTimeout(t.timer); t.timer = setTimeout(() => t.classList.remove('show'), duration);
    },
    confirm: (msg, onConfirm) => {
        const ov = document.getElementById('dialog');
        document.getElementById('dgMsg').textContent = msg;
        ov.classList.add('active');
        document.getElementById('dgConfirm').onclick = () => { ov.classList.remove('active'); onConfirm(); };
        document.getElementById('dgCancel').onclick = () => ov.classList.remove('active');
    }
};

// ================= 数据层 (Store) =================
const Store = {
    data: { book: [], setting: [], create: [], timeline: [] },
    state: { page: 'book', isTrash: false, search: '', filterTag: '', editId: null, selected: new Set(), tlView: 'list', createTab: '' },
    defaults: {
        book: { title:'', pubTime:'', author:'', count:'', typeList:[], finish:'未读', progress:'', priority:'', readDate:'', readingDates:[], relatedBooks:[], note:'', cover:'', tags:[], deleted:false },
        setting: { category:'', desc:'', from:'', linkedBookId:null, tags:[], deleted:false },
        create: { cat:'同人图', title:'', desc:'', date:'', tags:[], linkedBookIds:[], deleted:false, extra:{} }, 
        timeline: { title:'', desc:'', datetime:'', tags:[], linkedBookId:null, linkedCreateId:null, deleted:false }
    },
    
    init() {
        try {
            const raw = localStorage.getItem('DCData');
            if (raw) {
                const parsed = JSON.parse(raw);
                ['book', 'setting', 'create', 'timeline'].forEach(k => {
                    this.data[k] = (parsed[k]||[]).map(item => ({...this.defaults[k], ...item}));
                });
                this.data.create.forEach(c => {
                    if(!c.title) c.title = c.imgTitle || c.textTitle || '无标题';
                    if(!c.desc) c.desc = c.anaDesc || c.ideaDesc || c.word || '';
                    if(!c.date) c.date = c.imgDate || c.textDate || c.anaDate || c.ideaDate || '';
                    if(!c.extra) c.extra = { status: c.status, cost: c.cost, from: c.ideaFrom, book: c.anaBook, imgSrc: c.imgSrc };
                });
            }
        } catch(e) { console.error('数据加载失败', e); }
    },
    save() {
        try { localStorage.setItem('DCData', JSON.stringify(this.data)); UI.toast('已保存'); } 
        catch(e) { UI.toast('保存失败：可能空间不足'); }
        App.renderStats(); 
    },
    get(table) {
        let list = this.data[table].filter(item => item.deleted === this.state.isTrash);
        const { search, filterTag } = this.state;
        
        if (filterTag) list = list.filter(item => (item.tags||[]).includes(filterTag) || (item.category && item.category.includes(filterTag)));
        
        if (search) {
            const s = search.toLowerCase();
            list = list.filter(item => JSON.stringify(item).toLowerCase().includes(s));
        }
        
        if (table === 'book' && !this.state.isTrash) {
            const sort = document.getElementById('bookSort').value;
            list.sort((a,b) => {
                if(sort === 'default') {
                    const fMap = {'已读':2, '在读':0, '未读':1};
                    return (fMap[a.finish] - fMap[b.finish]) || (b.id - a.id);
                }
                if(sort === 'date-desc') return (b.readDate||'').localeCompare(a.readDate||'') || (b.id - a.id);
                if(sort === 'progress') {
                    const pa = a.finish==='已读'?1:(a.progress?parseFloat(a.progress)/parseFloat(a.count||1):0);
                    const pb = b.finish==='已读'?1:(b.progress?parseFloat(b.progress)/parseFloat(b.count||1):0);
                    return pb - pa;
                }
            });
        } else if (table === 'create' && this.state.createTab) {
            list = list.filter(item => item.cat === this.state.createTab);
        } else if (table === 'timeline') {
            list.sort((a,b) => (b.datetime||'').localeCompare(a.datetime||''));
        }
        return list;
    },
    getAllTags(table) {
        const s = new Set();
        this.data[table].filter(i => i.deleted === this.state.isTrash).forEach(i => {
            (i.tags||[]).forEach(t => s.add(t));
        });
        return Array.from(s).sort();
    },
    delete(table, id) {
        const item = this.data[table].find(i => i.id === id);
        if(item) { item.deleted = true; this.save(); }
    },
    restore(table, id) {
        const item = this.data[table].find(i => i.id === id);
        if(item) { item.deleted = false; this.save(); }
    },
    purge(table, id) {
        this.data[table] = this.data[table].filter(i => i.id !== id);
        this.save();
    }
};

// ================= 视图渲染 (View) =================
const View = {
    renderBook() {
        const list = Store.get('book');
        const html = list.map(item => {
            const sel = Store.state.selected.has(item.id);
            const cover = Utils.isValidImg(item.cover) ? `<img src="${item.cover}" class="cover">` : `<div class="cover">NO IMG</div>`;
            const badgeCls = item.finish==='已读'?'badge-done':(item.finish==='在读'?'badge-reading':'badge-unread');
            
            let progHtml = '';
            if(item.finish === '在读' && item.progress && item.count) {
                const pct = Math.min(100, Math.round(parseFloat(item.progress)/parseFloat(item.count)*100))||0;
                progHtml = `<div class="progress-wrap"><span>${item.progress}/${item.count}</span><div class="progress-bar"><div class="progress-inner ${pct>70?'high':pct<30?'low':''}" style="width:${pct}%"></div></div><span>${pct}%</span></div>`;
            }
            
            return `
            <div class="card ${Store.state.isTrash?'deleted':''}" data-id="${item.id}">
                ${!Store.state.isTrash ? `<input type="checkbox" style="position:absolute; top:16px; left:16px;" class="chk-item" value="${item.id}" ${sel?'checked':''}>` : ''}
                <div style="display:flex; gap:12px; ${!Store.state.isTrash?'padding-left:24px;':''}">
                    ${cover}
                    <div style="flex:1; min-width:0;">
                        <div class="card-title">${Utils.escape(item.title)} <span class="badge ${badgeCls}">${item.finish}</span> ${item.priority?`<span class="badge badge-warning">${item.priority}</span>`:''}</div>
                        <div class="meta">${Utils.escape((item.typeList||[]).join(' / '))} | ${Utils.escape(item.author)}</div>
                        <div class="meta">日期: ${item.readingDates.length ? item.readingDates.join(', ') : (item.readDate||'无')}</div>
                        ${progHtml}
                        <div class="tag-row">${(item.tags||[]).map(t => `<span class="tag filter-tag">${Utils.escape(t)}</span>`).join('')}</div>
                    </div>
                </div>
                ${item.note ? `<div class="desc">${Utils.escape(item.note)}</div>` : ''}
                <div class="mt-2" style="display:flex; gap:8px; justify-content:flex-end;">
                    ${Store.state.isTrash ? 
                        `<button class="btn btn-sm btn-outline action-restore">恢复</button><button class="btn btn-sm btn-danger action-purge">清除</button>` : 
                        `<button class="btn btn-sm btn-outline action-edit">编辑</button><button class="btn btn-sm btn-outline action-del text-danger">删除</button>`}
                </div>
            </div>`;
        }).join('');
        document.getElementById('bookList').innerHTML = html || `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 4v16"/></svg><p>${Store.state.isTrash?'回收站为空':'暂无记录，点击右下角添加'}</p></div>`;
        App.updateBatchBar();
    },

    renderSetting() {
        const list = Store.get('setting');
        const html = list.map(item => `
            <div class="card ${Store.state.isTrash?'deleted':''}" data-id="${item.id}">
                ${item.category ? `<div class="meta" style="color:var(--vapor-cyan); font-weight:600; text-shadow:0 0 5px var(--vapor-cyan);">[DIR] ${Utils.escape(item.category)}</div>` : ''}
                <div class="desc" style="background:transparent; border:none; padding:0; margin:4px 0; box-shadow:none;">${item.desc}</div>
                <div class="meta mt-2">来源: ${item.linkedBookId ? `<span class="link-book badge badge-dcu" data-bid="${item.linkedBookId}">[LINK] 关联刊物</span>` : Utils.escape(item.from||'无')}</div>
                <div class="tag-row">${(item.tags||[]).map(t => `<span class="tag filter-tag">${Utils.escape(t)}</span>`).join('')}</div>
                <div class="mt-2" style="display:flex; gap:8px; justify-content:flex-end;">
                    ${Store.state.isTrash ? `<button class="btn btn-sm btn-outline action-restore">恢复</button><button class="btn btn-sm btn-danger action-purge">清除</button>` : `<button class="btn btn-sm btn-outline action-edit">编辑</button><button class="btn btn-sm btn-outline action-del text-danger">删除</button>`}
                </div>
            </div>`).join('');
        document.getElementById('settingList').innerHTML = html || `<div class="empty-state"><p>暂无设定</p></div>`;
    },

    renderCreate() {
        const list = Store.get('create');
        const html = list.map(item => {
            let img = (item.cat==='同人图' && Utils.isValidImg(item.extra.imgSrc)) ? `<img src="${item.extra.imgSrc}" style="width:100%; border-radius:8px; margin-bottom:8px; max-height:200px; object-fit:cover; border:1px solid rgba(255,255,255,0.2);">` : '';
            return `
            <div class="card ${Store.state.isTrash?'deleted':''}" data-id="${item.id}">
                ${img}
                <div class="card-title">[${item.cat}] ${Utils.escape(item.title)}</div>
                <div class="meta">日期: ${item.date||'无'} ${item.extra.status ? `| 状态: ${item.extra.status}` : ''}</div>
                ${item.desc ? `<div class="desc">${item.desc}</div>` : ''}
                <div class="tag-row">${(item.tags||[]).map(t => `<span class="tag filter-tag">${Utils.escape(t)}</span>`).join('')}</div>
                <div class="mt-2" style="display:flex; gap:8px; justify-content:flex-end;">
                    ${Store.state.isTrash ? `<button class="btn btn-sm btn-outline action-restore">恢复</button><button class="btn btn-sm btn-danger action-purge">清除</button>` : `<button class="btn btn-sm btn-outline action-edit">编辑</button><button class="btn btn-sm btn-outline action-del text-danger">删除</button>`}
                </div>
            </div>`;
        }).join('');
        document.getElementById('createList').innerHTML = html || `<div class="empty-state"><p>暂无二创</p></div>`;
    },

    renderTimeline() {
        const list = Store.get('timeline');
        const isList = Store.state.tlView === 'list';
        
        let html = '';
        if(isList) {
            html = list.map(item => `
            <div class="card ${Store.state.isTrash?'deleted':''}" data-id="${item.id}">
                <div class="card-title">[TIME] ${Utils.escape(item.title)}</div>
                <div class="meta">${item.datetime?item.datetime.replace('T',' '):'无时间'}</div>
                ${item.desc ? `<div class="desc">${Utils.escape(item.desc)}</div>` : ''}
                <div class="tag-row">${(item.tags||[]).map(t => `<span class="tag filter-tag">${Utils.escape(t)}</span>`).join('')}</div>
                <div class="mt-2" style="display:flex; gap:8px; justify-content:flex-end;">
                    ${Store.state.isTrash ? `<button class="btn btn-sm btn-outline action-restore">恢复</button><button class="btn btn-sm btn-danger action-purge">清除</button>` : `<button class="btn btn-sm btn-outline action-edit">编辑</button><button class="btn btn-sm btn-outline action-del text-danger">删除</button>`}
                </div>
            </div>`).join('');
        } else {
            html = `<div class="timeline-wrap">` + list.map(item => `
            <div class="tl-item ${Store.state.isTrash?'deleted':''}" data-id="${item.id}">
                <div class="tl-time">${item.datetime?item.datetime.replace('T',' '):'无时间'}</div>
                <div style="font-weight:600; color:#fff; text-shadow:0 0 5px rgba(255,255,255,0.3);">${Utils.escape(item.title)}</div>
                ${item.desc ? `<div class="meta mt-2">${Utils.escape(item.desc)}</div>` : ''}
                <div class="mt-2 flex-start">
                    ${Store.state.isTrash ? `<button class="btn btn-sm btn-outline action-restore">恢复</button>` : `<button class="btn btn-sm btn-outline action-edit">编辑</button><button class="btn btn-sm btn-outline action-del text-danger">删除</button>`}
                </div>
            </div>`).join('') + `</div>`;
        }
        document.getElementById('timelineList').innerHTML = html || `<div class="empty-state"><p>暂无时间线</p></div>`;
    },

    renderTagsBar() {
        ['book','setting','create','timeline'].forEach(page => {
            const el = document.getElementById(page+'TagBar');
            if(el) {
                const tags = Store.getAllTags(page);
                el.innerHTML = tags.map(t => `<span class="tag filter-tag-main ${Store.state.filterTag===t?'active':''}">${Utils.escape(t)}</span>`).join('');
            }
        });
        const tip = document.getElementById('filterTip');
        if(Store.state.filterTag || Store.state.isTrash) {
            tip.style.display = 'flex';
            document.getElementById('filterTagName').textContent = (Store.state.isTrash?'[TRASH] ':'') + (Store.state.filterTag||'ALL');
        } else {
            tip.style.display = 'none';
        }
    }
};

// ================= 控制器 (App) =================
const App = {
    init() {
        Store.init();
        this.bindEvents();
        this.switchPage('book');
        this.renderStats();
    },
    
    switchPage(page) {
        Store.state.page = page;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page'+page.charAt(0).toUpperCase()+page.slice(1)).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`.nav-item[data-target="${page}"]`).classList.add('active');
        
        const titles = {book:'补刊记录', setting:'官方设定', create:'二创仓库', timeline:'时间线', stats:'统计中心'};
        document.getElementById('pageTitle').innerHTML = titles[page];
        
        document.getElementById('fabAdd').style.display = page==='stats' ? 'none' : 'flex';
        
        Store.state.selected.clear();
        this.refresh();
    },

    refresh() {
        View.renderTagsBar();
        if(Store.state.page === 'book') View.renderBook();
        else if(Store.state.page === 'setting') View.renderSetting();
        else if(Store.state.page === 'create') View.renderCreate();
        else if(Store.state.page === 'timeline') View.renderTimeline();
    },

    updateBatchBar() {
        const bar = document.getElementById('batchBar');
        if(Store.state.page !== 'book' || Store.state.isTrash || Store.state.selected.size === 0) {
            bar.classList.remove('show');
        } else {
            document.getElementById('batchCount').textContent = Store.state.selected.size;
            bar.classList.add('show');
        }
    },

    openForm(id = null) {
        Store.state.editId = id;
        document.getElementById('mfTitle').textContent = id ? '编辑记录' : '新增记录';
        const body = document.getElementById('mfBody');
        const page = Store.state.page;
        
        if (page === 'book') {
            const item = id ? Store.data.book.find(i=>i.id===id) : Store.defaults.book;
            body.innerHTML = `
                <div class="form-group"><label>标题 *</label><input type="text" id="fTitle" class="form-control" value="${Utils.escape(item.title)}"></div>
                <div class="form-group"><label>封面 (URL)</label><input type="text" id="fCover" class="form-control" value="${Utils.escape(item.cover)}"></div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;"><label>状态</label><select id="fFinish" class="form-control"><option value="未读" ${item.finish==='未读'?'selected':''}>未读</option><option value="在读" ${item.finish==='在读'?'selected':''}>在读</option><option value="已读" ${item.finish==='已读'?'selected':''}>已读</option></select></div>
                    <div class="form-group" style="flex:1;"><label>优先级</label><select id="fPri" class="form-control"><option value="">无</option><option value="高" ${item.priority==='高'?'selected':''}>高</option><option value="中" ${item.priority==='中'?'selected':''}>中</option><option value="低" ${item.priority==='低'?'selected':''}>低</option></select></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;"><label>进度</label><input type="text" id="fProg" class="form-control" value="${Utils.escape(item.progress)}" placeholder="如: 3"></div>
                    <div class="form-group" style="flex:1;"><label>总数</label><input type="text" id="fCount" class="form-control" value="${Utils.escape(item.count)}" placeholder="如: 6"></div>
                </div>
                <div class="form-group"><label>作者</label><input type="text" id="fAuth" class="form-control" value="${Utils.escape(item.author)}"></div>
                <div class="form-group"><label>日期</label><input type="date" id="fDate" class="form-control" value="${item.readDate}"></div>
                <div class="form-group"><label>标签 (逗号分隔)</label><input type="text" id="fTags" class="form-control" value="${(item.tags||[]).join(',')}"></div>
                <div class="form-group"><label>感想</label><textarea id="fNote" class="form-control">${Utils.escape(item.note)}</textarea></div>
            `;
        } else if (page === 'setting') {
            const item = id ? Store.data.setting.find(i=>i.id===id) : Store.defaults.setting;
            body.innerHTML = `
                <div class="form-group"><label>分类路径 (如: 世界观>魔法)</label><input type="text" id="fCat" class="form-control" value="${Utils.escape(item.category)}"></div>
                <div class="form-group"><label>设定描述 *</label>
                    <div class="editor-bar"><button type="button" onclick="document.execCommand('bold')"><b>B</b></button><button type="button" onclick="document.execCommand('insertUnorderedList')">列表</button></div>
                    <div id="fDesc" class="editor-content" contenteditable="true">${item.desc}</div>
                </div>
                <div class="form-group"><label>来源</label><input type="text" id="fFrom" class="form-control" value="${Utils.escape(item.from)}"></div>
                <div class="form-group"><label>标签</label><input type="text" id="fTags" class="form-control" value="${(item.tags||[]).join(',')}"></div>
            `;
        } else if (page === 'create') {
            const item = id ? Store.data.create.find(i=>i.id===id) : Store.defaults.create;
            body.innerHTML = `
                <div class="form-group"><label>类别</label><select id="fCat" class="form-control"><option value="同人图" ${item.cat==='同人图'?'selected':''}>同人图</option><option value="同人文" ${item.cat==='同人文'?'selected':''}>同人文</option><option value="分析" ${item.cat==='分析'?'selected':''}>分析</option><option value="灵感" ${item.cat==='灵感'?'selected':''}>灵感</option></select></div>
                <div class="form-group"><label>标题 *</label><input type="text" id="fTitle" class="form-control" value="${Utils.escape(item.title)}"></div>
                <div class="form-group"><label>描述/正文</label><textarea id="fDesc" class="form-control">${Utils.escape(item.desc)}</textarea></div>
                <div class="form-group"><label>日期</label><input type="date" id="fDate" class="form-control" value="${item.date}"></div>
                <div class="form-group"><label>标签</label><input type="text" id="fTags" class="form-control" value="${(item.tags||[]).join(',')}"></div>
            `;
        } else if (page === 'timeline') {
            const item = id ? Store.data.timeline.find(i=>i.id===id) : Store.defaults.timeline;
            body.innerHTML = `
                <div class="form-group"><label>时间线标题 *</label><input type="text" id="fTitle" class="form-control" value="${Utils.escape(item.title)}"></div>
                <div class="form-group"><label>时间</label><input type="datetime-local" id="fTime" class="form-control" value="${item.datetime}"></div>
                <div class="form-group"><label>描述</label><textarea id="fDesc" class="form-control">${Utils.escape(item.desc)}</textarea></div>
                <div class="form-group"><label>标签</label><input type="text" id="fTags" class="form-control" value="${(item.tags||[]).join(',')}"></div>
            `;
        }
        
        document.getElementById('modalForm').classList.add('active');
    },

    saveForm() {
        const page = Store.state.page;
        const id = Store.state.editId || Utils.id();
        let obj = { id, deleted: false };
        
        const getTags = idStr => (document.getElementById(idStr).value||'').split(/[,，]/).map(t=>t.trim()).filter(t=>t);

        if (page === 'book') {
            obj.title = document.getElementById('fTitle').value.trim();
            if(!obj.title) return UI.toast('请输入标题');
            Object.assign(obj, {
                cover: document.getElementById('fCover').value.trim(),
                finish: document.getElementById('fFinish').value,
                priority: document.getElementById('fPri').value,
                progress: document.getElementById('fProg').value,
                count: document.getElementById('fCount').value,
                author: document.getElementById('fAuth').value,
                readDate: document.getElementById('fDate').value,
                readingDates: document.getElementById('fDate').value ? [document.getElementById('fDate').value] : [],
                note: document.getElementById('fNote').value,
                tags: getTags('fTags'),
                typeList: []
            });
        } else if (page === 'setting') {
            obj.desc = document.getElementById('fDesc').innerHTML;
            if(!Utils.stripHtml(obj.desc)) return UI.toast('请输入描述');
            Object.assign(obj, {
                category: document.getElementById('fCat').value,
                from: document.getElementById('fFrom').value,
                tags: getTags('fTags')
            });
        } else if (page === 'create') {
            obj.title = document.getElementById('fTitle').value.trim();
            if(!obj.title) return UI.toast('请输入标题');
            Object.assign(obj, {
                cat: document.getElementById('fCat').value,
                desc: document.getElementById('fDesc').value,
                date: document.getElementById('fDate').value,
                tags: getTags('fTags'),
                extra: {}
            });
        } else if (page === 'timeline') {
            obj.title = document.getElementById('fTitle').value.trim();
            if(!obj.title) return UI.toast('请输入标题');
            Object.assign(obj, {
                datetime: document.getElementById('fTime').value,
                desc: document.getElementById('fDesc').value,
                tags: getTags('fTags')
            });
        }

        const list = Store.data[page];
        const idx = list.findIndex(i => i.id === id);
        if(idx > -1) list[idx] = {...list[idx], ...obj};
        else list.unshift(obj);
        
        Store.save();
        document.getElementById('modalForm').classList.remove('active');
        this.refresh();
    },

    bindEvents() {
        document.querySelectorAll('.nav-item').forEach(el => el.onclick = () => this.switchPage(el.dataset.target));
        
        const sInput = document.getElementById('searchInput');
        sInput.addEventListener('input', Utils.debounce(() => { Store.state.search = sInput.value; this.refresh(); }, 300));
        
        document.getElementById('btnTrash').onclick = function() {
            Store.state.isTrash = !Store.state.isTrash;
            this.classList.toggle('active');
            Store.state.selected.clear();
            App.refresh();
        };

        document.addEventListener('click', e => {
            if(e.target.classList.contains('filter-tag')) {
                Store.state.filterTag = e.target.textContent;
                App.refresh();
            } else if(e.target.classList.contains('filter-tag-main')) {
                Store.state.filterTag = Store.state.filterTag === e.target.textContent ? '' : e.target.textContent;
                App.refresh();
            }
        });
        document.getElementById('btnClearFilter').onclick = () => { Store.state.filterTag = ''; App.refresh(); };

        document.getElementById('fabAdd').onclick = () => this.openForm();
        document.getElementById('mfClose').onclick = () => document.getElementById('modalForm').classList.remove('active');
        document.getElementById('btnSaveForm').onclick = () => this.saveForm();

        document.getElementById('mainScroll').addEventListener('click', e => {
            const card = e.target.closest('.card, .tl-item');
            if(!card) return;
            const id = parseInt(card.dataset.id);
            
            if(e.target.classList.contains('action-edit')) this.openForm(id);
            else if(e.target.classList.contains('action-del')) {
                UI.confirm('确定移入回收站？', () => { Store.delete(Store.state.page, id); this.refresh(); });
            }
            else if(e.target.classList.contains('action-restore')) { Store.restore(Store.state.page, id); this.refresh(); }
            else if(e.target.classList.contains('action-purge')) {
                UI.confirm('彻底删除不可恢复！确定？', () => { Store.purge(Store.state.page, id); this.refresh(); });
            }
        });

        document.getElementById('bookList').addEventListener('change', e => {
            if(e.target.classList.contains('chk-item')) {
                const id = parseInt(e.target.value);
                if(e.target.checked) Store.state.selected.add(id); else Store.state.selected.delete(id);
                this.updateBatchBar();
            }
        });

        document.getElementById('bCancel').onclick = () => { Store.state.selected.clear(); this.refresh(); };
        document.getElementById('bMarkDone').onclick = () => {
            Store.state.selected.forEach(id => {
                const b = Store.data.book.find(i=>i.id===id);
                if(b) { b.finish = '已读'; b.progress = ''; }
            });
            Store.state.selected.clear(); Store.save(); this.refresh();
        };
        document.getElementById('bDelete').onclick = () => {
            UI.confirm(`确认删除 ${Store.state.selected.size} 项？`, () => {
                Store.state.selected.forEach(id => Store.delete('book', id));
                Store.state.selected.clear(); this.refresh();
            });
        };

        document.getElementById('bookSort').onchange = () => this.refresh();
        document.getElementById('createTabGroup').addEventListener('click', e => {
            if(e.target.classList.contains('checkbox-btn')) {
                document.querySelectorAll('#createTabGroup .checkbox-btn').forEach(b=>b.classList.remove('active'));
                e.target.classList.add('active');
                Store.state.createTab = e.target.dataset.val;
                this.refresh();
            }
        });
        document.getElementById('btnViewList').onclick = function() { Store.state.tlView='list'; this.classList.add('active'); document.getElementById('btnViewTime').classList.remove('active'); App.refresh(); };
        document.getElementById('btnViewTime').onclick = function() { Store.state.tlView='time'; this.classList.add('active'); document.getElementById('btnViewList').classList.remove('active'); App.refresh(); };

        document.getElementById('btnExport').onclick = () => {
            const blob = new Blob([JSON.stringify(Store.data)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Archive_Backup.json'; a.click();
        };
        document.getElementById('btnImport').onclick = () => document.getElementById('fileImport').click();
        document.getElementById('fileImport').onchange = e => {
            const file = e.target.files[0]; if(!file) return;
            const r = new FileReader();
            r.onload = ev => {
                try {
                    const parsed = JSON.parse(ev.target.result);
                    UI.confirm('即将覆盖当前数据，确认继续？', () => {
                        localStorage.setItem('DCData', JSON.stringify(parsed));
                        window.location.reload();
                    });
                } catch(err) { UI.toast('文件格式错误'); }
            };
            r.readAsText(file);
        };
        document.getElementById('btnEmptyTrash').onclick = () => {
            UI.confirm('彻底清空所有回收站数据？', () => {
                ['book','setting','create','timeline'].forEach(k => {
                    Store.data[k] = Store.data[k].filter(i => !i.deleted);
                });
                Store.save(); this.refresh();
            });
        };
    },

    renderStats() {
        const books = Store.data.book.filter(b=>!b.deleted);
        const done = books.filter(b=>b.finish==='已读').length;
        const reading = books.filter(b=>b.finish==='在读').length;
        
        document.getElementById('stTotal').textContent = books.length;
        document.getElementById('stDone').textContent = done;
        document.getElementById('stReading').textContent = reading;
        document.getElementById('stRemain').textContent = books.length - done - reading;

        let size = 0; for(let k in localStorage) if(localStorage.hasOwnProperty(k)) size += localStorage[k].length;
        document.getElementById('storageInfo').textContent = `系统存储用量: ${(size/1024).toFixed(1)} KB`;

        const daily = {};
        books.forEach(b => { (b.readingDates||[]).forEach(d => { if(d) daily[d] = (daily[d]||0)+1; }); });
        
        let calHtml = '<div class="cal-grid">';
        const endD = new Date();
        const startD = new Date(); startD.setDate(endD.getDate() - 140);
        
        for(let d=new Date(startD); d<=endD; d.setDate(d.getDate()+1)) {
            const ds = Utils.formatDate(d.toISOString());
            const c = daily[ds] || 0;
            const lv = c>=4?4:c>=2?3:c>=1?2:c>0?1:0;
            calHtml += `<div class="cal-cell" data-lv="${lv}" title="${ds}: ${c}本"></div>`;
        }
        calHtml += '</div>';
        document.getElementById('calContainer').innerHTML = calHtml;

        const branches = {'DCU主宇宙':{d:0,t:0}, '平行宇宙':{d:0,t:0}, '漫威主宇宙':{d:0,t:0}};
        books.forEach(b => {
            (b.typeList||[]).forEach(t => {
                if(branches[t] !== undefined) { branches[t].t++; if(b.finish==='已读') branches[t].d++; }
            });
        });
        document.getElementById('stBranch').innerHTML = Object.keys(branches).map(k => {
            const v = branches[k]; if(v.t===0) return '';
            const pct = Math.round(v.d/v.t*100);
            return `<div style="margin-bottom:8px; font-size:12px;"><div class="flex-between"><span>${k}</span><span>${v.d}/${v.t} (${pct}%)</span></div><div class="progress-bar mt-2"><div class="progress-inner ${pct>70?'high':''}" style="width:${pct}%"></div></div></div>`;
        }).join('');
    }
};

window.onload = () => App.init();
</script>
