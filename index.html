<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DC 角色阅读顺序 · 本地导航</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(145deg, #e1effa 0%, #c9dff2 40%, #b3d0eb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      margin: 0;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 25% 35%, rgba(255, 255, 255, 0.55) 0%, transparent 55%),
                  radial-gradient(circle at 75% 65%, rgba(55, 110, 180, 0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1050px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 3.2rem;
      padding: 2.8rem 2.4rem;
      box-shadow: 0 30px 55px -15px rgba(0, 50, 100, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.65) inset;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .header {
      text-align: center;
      margin-bottom: 3.2rem;
    }

    .header h1 {
      font-size: 2.8rem;
      font-weight: 580;
      color: #07273f;
      letter-spacing: -0.4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      flex-wrap: wrap;
      text-shadow: 0 5px 12px rgba(255, 255, 255, 0.7);
    }

    .header h1 .title-badge {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 0.2rem 1.6rem;
      border-radius: 3rem;
      font-size: 2rem;
      color: #12456b;
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 10px 22px rgba(0, 70, 140, 0.15);
    }

    .subhead {
      margin-top: 0.9rem;
      font-size: 1rem;
      color: #215277;
      font-weight: 480;
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: inline-block;
      padding: 0.4rem 2.2rem;
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.7);
      letter-spacing: 0.2px;
    }

    /* 分组 */
    .group-section {
      margin-bottom: 2.8rem;
    }

    .group-title {
      font-size: 1.5rem;
      font-weight: 560;
      color: #09314b;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 1.4rem;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 2.5rem;
      width: fit-content;
      border-left: 5px solid #2c6699;
      box-shadow: 0 8px 20px rgba(0, 90, 170, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    /* 几何图标替代卡通图标 */
    .geo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      font-weight: 600;
      font-size: 0.9rem;
      color: #0b3b5c;
      border: 1px solid rgba(255, 255, 255, 0.8);
      margin-right: 0.3rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
      gap: 1.6rem;
    }

    /* 玻璃卡片 */
    .card {
      background: rgba(255, 255, 255, 0.48);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2rem;
      padding: 2rem 1.2rem;
      text-decoration: none;
      color: #082b40;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: all 0.28s ease;
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 14px 30px -10px rgba(0, 70, 130, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.55) inset;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      top: -30%;
      left: -20%;
      width: 55%;
      height: 120%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.7) 0%, transparent 70%);
      transform: rotate(25deg);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 24px 42px -12px rgba(0, 90, 160, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.8) inset;
      border-color: rgba(255, 255, 255, 0.9);
    }

    .card:hover::after {
      opacity: 0.5;
    }

    /* 卡片内的几何图形代替卡通图标 */
    .card-symbol {
      width: 3.4rem;
      height: 3.4rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 16px rgba(0, 80, 150, 0.2);
      transition: all 0.25s;
      font-weight: 600;
      font-size: 1.4rem;
      color: #094067;
    }

    .card:hover .card-symbol {
      background: rgba(255, 255, 255, 0.8);
      transform: scale(1.04);
      box-shadow: 0 10px 20px rgba(0, 90, 170, 0.3);
    }

    .card-name {
      font-weight: 620;
      font-size: 1.45rem;
      letter-spacing: 0.1px;
      color: #04273b;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 0.3rem 1.4rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.7);
      margin-top: 0.2rem;
    }

    .card-hint {
      font-size: 0.85rem;
      margin-top: 0.7rem;
      color: #154a66;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 0.25rem 1.2rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.65);
      font-weight: 480;
    }

    .notice {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.9rem;
      color: #173e57;
      opacity: 0.85;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: inline-block;
      padding: 0.4rem 2.2rem;
      border-radius: 2rem;
      margin-left: auto;
      margin-right: auto;
      width: fit-content;
      border: 1px solid rgba(255,255,255,0.7);
    }

    @media (max-width: 600px) {
      .container {
        padding: 2rem 1.2rem;
        border-radius: 2.5rem;
      }
      .header h1 {
        font-size: 2.2rem;
      }
      .card-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        DC 阅读顺序
        <span class="title-badge">本地导航</span>
      </h1>
      <div class="subhead">点击卡片打开角色专属阅读指南</div>
    </div>

    <!-- 闪电家族 (用几何闪电符号) -->
    <div class="group-section">
      <div class="group-title">
        <span class="geo-icon">⚡</span> 闪电家族 · 极速者
      </div>
      <div class="card-grid">
        <a href="Barry-Allen.html" class="card">
          <div class="card-symbol">⚡</div>
          <div class="card-name">Barry Allen</div>
          <div class="card-hint">巴里·艾伦 · 二代闪电侠</div>
        </a>
        <a href="Wally-West.html" class="card">
          <div class="card-symbol">💨</div>
          <div class="card-name">Wally West</div>
          <div class="card-hint">沃利·韦斯特 · 三代闪电侠</div>
        </a>
      </div>
    </div>

    <!-- 绿灯侠 (使用几何圆环) -->
    <div class="group-section">
      <div class="group-title">
        <span class="geo-icon">◉</span> 绿灯侠 · 意志之光
      </div>
      <div class="card-grid">
        <a href="Hal-Jordan.html" class="card">
          <div class="card-symbol">◉</div>
          <div class="card-name">Hal Jordan</div>
          <div class="card-hint">哈尔·乔丹 · 最伟大的绿灯侠</div>
        </a>
      </div>
    </div>

    <!-- 蝙蝠家族 (使用简洁蝙蝠轮廓替代卡通) -->
    <div class="group-section">
      <div class="group-title">
        <span class="geo-icon">◈</span> 哥谭骑士 · 蝙蝠家族
      </div>
      <div class="card-grid">
        <a href="Tim-Drake.html" class="card">
          <div class="card-symbol">◈</div>
          <div class="card-name">Tim Drake</div>
          <div class="card-hint">蒂姆·德雷克 · 第三代罗宾</div>
        </a>
      </div>
    </div>

    <!-- 沙赞 (使用星星几何) -->
    <div class="group-section">
      <div class="group-title">
        <span class="geo-icon">✦</span> 魔法传奇 · 沙赞之力
      </div>
      <div class="card-grid">
        <a href="Billy-Batson.html" class="card">
          <div class="card-symbol">✦</div>
          <div class="card-name">Billy Batson</div>
          <div class="card-hint">比利·巴特森 · 沙赞</div>
        </a>
      </div>
    </div>

    <div class="notice">
      ⚡ 所有链接均为本地文件，请确保导航页与角色 HTML 文件位于同一文件夹
    </div>
  </div>
</body>
</html>
