<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC 角色阅读顺序指南 | DC Archives</title>
    <!-- 引入思源宋体 Noto Serif SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 基础重置与字体设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a0b2e;
            overflow: hidden; /* 防止网格溢出滚动 */
            position: relative;
        }

        /* 蒸汽波风格背景：渐变星空 */
        .vaporwave-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #090a0f 0%, #1a0b2e 40%, #4b1d52 100%);
            z-index: -3;
        }

        /* 蒸汽波风格背景：落日 */
        .vaporwave-sun {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: linear-gradient(180deg, #ffcc00 0%, #ff007f 100%);
            box-shadow: 0 0 60px rgba(255, 0, 127, 0.6);
            z-index: -2;
            /* 模拟落日百叶窗切片效果 */
            -webkit-mask-image: repeating-linear-gradient(to bottom, #000 0%, #000 8%, transparent 8%, transparent 10%);
            mask-image: repeating-linear-gradient(to bottom, #000 0%, #000 8%, transparent 8%, transparent 10%);
        }

        /* 蒸汽波风格背景：3D透视霓虹网格 */
        .vaporwave-grid {
            position: absolute;
            bottom: -20%;
            left: -50%;
            width: 200%;
            height: 60%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.4) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(600px) rotateX(75deg);
            z-index: -1;
            box-shadow: inset 0 20px 40px #4b1d52;
        }

        /* 玻璃拟态主面板 */
        .glass-container {
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            /* 核心：高斯模糊与半透明背景 */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            /* 边缘高光，增强玻璃质感 */
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            z-index: 10;
            text-align: center;
        }

        /* 标题样式：霓虹发光与思源宋体的结合 */
        h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        p.subtitle {
            color: #ffb3ff;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 35px;
            text-shadow: 0 0 5px #ff00ff;
        }

        /* 导航链接列表 */
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 按钮/链接样式 */
        .nav-item {
            display: block;
            text-decoration: none;
            color: #e0e0e0;
            font-size: 18px;
            padding: 16px 20px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 按钮内部中英文排版 */
        .nav-item .en-name {
            display: block;
            font-size: 12px;
            font-weight: 400;
            color: #00ffff;
            opacity: 0.8;
            margin-top: 4px;
            font-family: monospace; /* 英文名用等宽字体增加复古科幻感 */
        }

        /* 悬停交互：蒸汽波粉色/青色霓虹反转 */
        .nav-item:hover {
            background: rgba(255, 0, 255, 0.15);
            border-color: #ff00ff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5), inset 0 0 10px rgba(255, 0, 255, 0.2);
            transform: translateY(-3px);
            text-shadow: 0 0 8px #ffffff;
        }

        .nav-item:hover .en-name {
            color: #ffb3ff;
            opacity: 1;
        }
        
        /* 响应式调整 */
        @media (max-width: 480px) {
            .glass-container {
                padding: 30px 20px;
            }
            .vaporwave-sun {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>
